<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>

    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="usuario"
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    />

    <button (click)="iniciarSesion()">Ingresar</button>

    <p class="error" *ngIf="mensajeError">
      {{ mensajeError }}
    </p>
  </div>
</div>
